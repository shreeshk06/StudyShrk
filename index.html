<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShrk - Room Hosting & Video Calling</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        .chat-message {
            animation: slideIn 0.3s ease-in;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        button:active { transform: scale(0.98); }
        input:focus { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const socket = io('http://localhost:4000', {
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: 5
        });

        function ChatPanel({ socket }) {
            const [msg, setMsg] = useState('');
            const [messages, setMessages] = useState([]);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            useEffect(() => {
                socket.on('chat-message', (m) => {
                    setMessages(prev => [...prev, { ...m, timestamp: new Date().toLocaleTimeString() }]);
                });
                return () => socket.off('chat-message');
            }, []);

            const send = () => {
                if (!msg.trim()) return;
                socket.emit('chat-message', { text: msg });
                setMessages(prev => [...prev, { text: msg, timestamp: new Date().toLocaleTimeString(), sent: true }]);
                setMsg('');
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') send();
            };

            return (
                <div className="w-80 bg-zinc-900 border-l border-zinc-800 flex flex-col h-full">
                    <div className="p-4 border-b border-zinc-800">
                        <h3 className="text-white font-bold">Chat Room</h3>
                    </div>
                    <div className="flex-1 overflow-auto p-4 space-y-3">
                        {messages.map((m, i) => (
                            <div key={i} className="chat-message">
                                <div className={`p-3 rounded-xl ${m.sent ? 'bg-cyan-600 ml-auto w-fit' : 'bg-zinc-800'}`}>
                                    <p className="text-white text-sm break-words">{m.text}</p>
                                    <p className="text-zinc-400 text-xs mt-1">{m.timestamp}</p>
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    <div className="p-3 border-t border-zinc-800 flex gap-2">
                        <input
                            value={msg}
                            onChange={(e) => setMsg(e.target.value)}
                            onKeyPress={handleKeyPress}
                            className="flex-1 bg-zinc-800 p-3 rounded-xl text-white placeholder-zinc-500"
                            placeholder="Type message..."
                        />
                        <button
                            onClick={send}
                            className="bg-cyan-500 hover:bg-cyan-600 px-5 py-3 rounded-xl font-bold text-white transition"
                        >
                            Send
                        </button>
                    </div>
                </div>
            );
        }

        function MediaPanel({ socket, room }) {
            const [url, setUrl] = useState('');

            const detectType = (u) => {
                if (u.includes('youtube.com') || u.includes('youtu.be')) return 'video';
                if (u.endsWith('.pdf')) return 'pdf';
                return 'website';
            };

            const load = () => {
                if (!url.trim()) return;
                socket.emit('workspace-load', { room, object: { type: detectType(url), url } });
                setUrl('');
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') load();
            };

            return (
                <div className="bg-zinc-900 border-t border-zinc-800 p-4 flex gap-3">
                    <input
                        value={url}
                        onChange={(e) => setUrl(e.target.value)}
                        onKeyPress={handleKeyPress}
                        placeholder="Paste website/YouTube/PDF link"
                        className="flex-1 bg-zinc-800 rounded-xl p-3 text-white placeholder-zinc-500"
                    />
                    <button
                        onClick={load}
                        className="bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-xl font-bold text-white transition"
                    >
                        Load
                    </button>
                </div>
            );
        }

        function RoomBar({ room, connected }) {
            return (
                <div className="h-16 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-5">
                    <div className="text-2xl font-bold text-cyan-500">🦈 StudyShrk</div>
                    <div className="flex items-center gap-4">
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${connected ? 'bg-green-500' : 'bg-red-500'}`}></div>
                            <span className="text-xs text-zinc-400">{connected ? 'Connected' : 'Disconnected'}</span>
                        </div>
                        <div className="bg-zinc-800 px-4 py-2 rounded-xl text-sm font-mono tracking-widest text-zinc-400">
                            ROOM: <span className="text-white font-bold">{room}</span>
                        </div>
                    </div>
                </div>
            );
        }

        function Workspace({ state }) {
            const iframeRef = useRef();
            const videoRef = useRef();

            useEffect(() => {
                if (!state?.current) return;
                if (state.current.type === 'website') {
                    iframeRef.current.src = state.current.url;
                }
                if (state.current.type === 'video') {
                    videoRef.current.src = state.current.url;
                }
            }, [state]);

            if (!state?.current) {
                return (
                    <div className="flex-1 flex items-center justify-center flex-col text-zinc-500 bg-zinc-950">
                        <p className="text-2xl mb-2">📚</p>
                        <p className="text-lg">Empty Workspace</p>
                        <p className="text-sm mt-2">Load a website, video, or PDF from below</p>
                    </div>
                );
            }

            return (
                <div className="flex-1 relative overflow-hidden bg-zinc-950">
                    {state.current.type === 'website' && (
                        <iframe
                            ref={iframeRef}
                            className="w-full h-full border-none"
                            title="workspace"
                            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"
                        />
                    )}
                    {state.current.type === 'video' && (
                        <video ref={videoRef} controls className="w-full h-full object-contain" />
                    )}
                    {state.current.type === 'pdf' && (
                        <iframe className="w-full h-full" src={state.current.url} title="pdf" />
                    )}
                </div>
            );
        }

        function App() {
            const [room, setRoom] = useState('');
            const [joined, setJoined] = useState(false);
            const [name, setName] = useState('');
            const [state, setState] = useState(null);
            const [connected, setConnected] = useState(false);

            useEffect(() => {
                socket.on('connect', () => setConnected(true));
                socket.on('disconnect', () => setConnected(false));
                socket.on('room-state', (data) => setState(data));
                socket.on('workspace-update', (data) => setState(data));

                return () => {
                    socket.off('connect');
                    socket.off('disconnect');
                    socket.off('room-state');
                    socket.off('workspace-update');
                };
            }, []);

            const joinRoom = () => {
                if (!room.trim() || !name.trim()) {
                    alert('Please enter both name and room code');
                    return;
                }
                socket.emit('join-room', { room, name });
                setJoined(true);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') joinRoom();
            };

            if (!joined) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-zinc-900 rounded-3xl border border-zinc-800 p-8 space-y-6">
                            <div className="text-center">
                                <div className="text-5xl mb-3">🦈</div>
                                <h1 className="text-4xl font-bold text-white">StudyShrk</h1>
                                <p className="text-zinc-400 text-sm mt-2">Room Hosting & Video Calling</p>
                            </div>

                            <div className="space-y-4">
                                <input
                                    className="w-full bg-zinc-800 rounded-xl p-4 text-white placeholder-zinc-500 border border-zinc-700 focus:border-cyan-500 transition"
                                    placeholder="Your name"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    autoFocus
                                />
                                <input
                                    className="w-full bg-zinc-800 rounded-xl p-4 text-white placeholder-zinc-500 border border-zinc-700 focus:border-cyan-500 transition"
                                    placeholder="Room code"
                                    value={room}
                                    onChange={(e) => setRoom(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                />
                                <button
                                    onClick={joinRoom}
                                    className="w-full bg-cyan-500 hover:bg-cyan-600 text-white p-4 rounded-xl font-bold transition"
                                >
                                    Join Workspace
                                </button>
                            </div>

                            <div className={`text-center text-xs p-3 rounded-lg ${connected ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}`}>
                                {connected ? '✓ Connected to server' : '✗ Waiting for server (localhost:4000)'}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-black text-white flex flex-col overflow-hidden">
                    <RoomBar room={room} connected={connected} />
                    <div className="flex flex-1 overflow-hidden">
                        <Workspace state={state} />
                        <ChatPanel socket={socket} />
                    </div>
                    <MediaPanel socket={socket} room={room} />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
